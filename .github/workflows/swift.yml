name: "Swift Package CI"

on:
  push:
    branches: "main"
  pull_request:
    branches: ["main", "develop"]

jobs:
  build:
    name: Build & Test (macOS, Swift 6.2)
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Verify tools
        run: |
          xcodebuild -version
          swift --version

      - name: Run tests
        run: swift test --parallel
