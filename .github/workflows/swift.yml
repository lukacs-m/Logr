jobs:
  build:
    name: Build & Test (macOS, Swift 6.2)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Swift toolchain 6.2
        # You might use apple’s `swift-setup` action or a script
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Confirm Swift version
        run: swift --version

      - name: Build package (including tests)
        run: swift build

      - name: Run tests
        run: swift test
