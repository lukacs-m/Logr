# Logr Documentation - GitHub Pages Configuration
title: Logr
description: A powerful, persistent logging library for Apple platforms
baseurl: "Logr/"
url: "https://lukacs-m.github.io"

# Theme
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme

# Markdown
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  hard_wrap: false

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
